<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; }

    .column-new      { border-top: 4px solid #ef4444; }
    .column-mine     { border-top: 4px solid #f97316; }
    .column-theirs   { border-top: 4px solid #eab308; }
    .column-complete { border-top: 4px solid #22c55e; }

    .badge-new      { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
    .badge-mine     { background: #f9731620; color: #f97316; border: 1px solid #f9731640; }
    .badge-theirs   { background: #eab30820; color: #eab308; border: 1px solid #eab30840; }
    .badge-complete { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }

    /* Team badges */
    .team-badge { font-size: 11px; border-radius: 99px; padding: 2px 8px; font-weight: 600; display: inline-block; }
    .team-Messaging      { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
    .team-PPC            { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f640; }
    .team-SEO            { background: #f9731620; color: #f97316; border: 1px solid #f9731640; }
    .team-Growth         { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
    .team-Paid-Social    { background: #eab30820; color: #eab308; border: 1px solid #eab30840; }
    .team-Content-Merch    { background: #a855f720; color: #a855f7; border: 1px solid #a855f740; }
    .team-Retail           { background: #14b8a620; color: #14b8a6; border: 1px solid #14b8a640; }
    .team-Affiliate        { background: #ec489920; color: #ec4899; border: 1px solid #ec489940; }
    .team-Digital-Partner  { background: #0ea5e920; color: #0ea5e9; border: 1px solid #0ea5e940; }

    /* Card left border by team */
    .card-team-Messaging       { border-left: 4px solid #22c55e !important; }
    .card-team-PPC             { border-left: 4px solid #3b82f6 !important; }
    .card-team-SEO             { border-left: 4px solid #f97316 !important; }
    .card-team-Growth          { border-left: 4px solid #ef4444 !important; }
    .card-team-Paid-Social     { border-left: 4px solid #eab308 !important; }
    .card-team-Content-Merch   { border-left: 4px solid #a855f7 !important; }
    .card-team-Retail          { border-left: 4px solid #14b8a6 !important; }
    .card-team-Affiliate       { border-left: 4px solid #ec4899 !important; }
    .card-team-Digital-Partner { border-left: 4px solid #0ea5e9 !important; }

    /* Pending duration badge */
    .pending-fresh  { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
    .pending-mid    { background: #eab30820; color: #eab308; border: 1px solid #eab30840; }
    .pending-late   { background: #f9731620; color: #f97316; border: 1px solid #f9731640; }
    .pending-overdue{ background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: grab;
      transition: box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; transform: scale(0.97); }
    .card:hover { border-color: #475569; box-shadow: 0 4px 16px #0008; }

    .drop-zone {
      min-height: 80px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .drop-zone.drag-over { background: #ffffff10; outline: 2px dashed #475569; }

    .col-header-count {
      font-size: 11px;
      background: #334155;
      color: #94a3b8;
      border-radius: 99px;
      padding: 1px 8px;
    }

    /* Modal */
    #modal-backdrop {
      background: #00000088;
      backdrop-filter: blur(4px);
    }
    input, textarea, select {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-text-fill-color: #e2e8f0;
      caret-color: #e2e8f0;
    }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    select option { background: #1e293b; color: #e2e8f0; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill {
      -webkit-text-fill-color: #e2e8f0;
      -webkit-box-shadow: 0 0 0px 1000px #0f172a inset;
      box-shadow: 0 0 0px 1000px #0f172a inset;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #334155;
    }
    .btn-ghost:hover { background: #1e293b; color: #e2e8f0; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; border: 1px solid #334155;
      color: #e2e8f0; border-radius: 10px;
      padding: 12px 18px; z-index: 9999;
      box-shadow: 0 8px 32px #0008;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s;
      cursor: pointer;
      color: #64748b;
    }
    .card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ef4444; }

    /* Config banner */
    #config-banner {
      background: #451a03;
      border: 1px solid #92400e;
      border-radius: 10px;
      color: #fbbf24;
      padding: 12px 18px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Team filter buttons */
    .filter-btn {
      font-size: 12px; font-weight: 600; border-radius: 99px;
      padding: 5px 14px; cursor: pointer; transition: all 0.15s;
      border: 2px solid transparent; background: #1e293b; color: #94a3b8;
    }
    .filter-btn:hover { color: #e2e8f0; background: #334155; }
    .filter-btn.active { color: #fff; }
    .filter-all.active                { background: #6366f1; border-color: #6366f1; }
    .filter-Messaging.active          { background: #22c55e; border-color: #22c55e; color: #fff; }
    .filter-PPC.active                { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .filter-SEO.active                { background: #f97316; border-color: #f97316; color: #fff; }
    .filter-Growth.active             { background: #ef4444; border-color: #ef4444; color: #fff; }
    .filter-Paid-Social.active        { background: #eab308; border-color: #eab308; color: #000; }
    .filter-Content-Merch.active      { background: #a855f7; border-color: #a855f7; color: #fff; }
    .filter-Retail.active             { background: #14b8a6; border-color: #14b8a6; color: #fff; }
    .filter-Affiliate.active          { background: #ec4899; border-color: #ec4899; color: #fff; }
    .filter-Digital-Partner.active    { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
  </style>
</head>
<body class="min-h-screen p-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white">My Projects Board</h1>
      <p class="text-slate-400 text-sm mt-0.5">Drag cards between columns · Add new ideas below</p>
    </div>
    <button onclick="openModal()" class="btn-primary flex items-center gap-2">
      <span class="text-lg leading-none">+</span> New Idea
    </button>
  </div>

  <!-- Team filter bar -->
  <div class="flex flex-wrap gap-2 mb-5">
    <button class="filter-btn filter-all active" onclick="setFilter(null, this)">All</button>
    <button class="filter-btn filter-Messaging"     onclick="setFilter('Messaging', this)">Messaging</button>
    <button class="filter-btn filter-PPC"           onclick="setFilter('PPC', this)">PPC</button>
    <button class="filter-btn filter-SEO"           onclick="setFilter('SEO', this)">SEO</button>
    <button class="filter-btn filter-Growth"        onclick="setFilter('Growth', this)">Growth</button>
    <button class="filter-btn filter-Paid-Social"   onclick="setFilter('Paid Social', this)">Paid Social</button>
    <button class="filter-btn filter-Content-Merch"   onclick="setFilter('Content & Merch', this)">Content &amp; Merch</button>
    <button class="filter-btn filter-Retail"          onclick="setFilter('Retail', this)">Retail</button>
    <button class="filter-btn filter-Affiliate"       onclick="setFilter('Affiliate', this)">Affiliate</button>
    <button class="filter-btn filter-Digital-Partner" onclick="setFilter('Digital Partner', this)">Digital Partner</button>
  </div>

  <!-- Config banner (shown until Supabase is connected) -->
  <div id="config-banner">
    ⚠️ <strong>Setup needed:</strong> Open <code>config.js</code> and add your Supabase URL and key to enable saving.
    Cards will work in-memory until then. <a href="#" onclick="dismissBanner()" class="underline ml-2">Dismiss</a>
  </div>

  <!-- Board -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">

    <!-- New Idea -->
    <div class="column-new bg-slate-800/60 rounded-xl p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>
          <span class="font-semibold text-white text-sm">New Idea</span>
        </div>
        <span id="count-new" class="col-header-count">0</span>
      </div>
      <div id="col-new" class="drop-zone" ondragover="onDragOver(event)" ondrop="onDrop(event,'new')" ondragleave="onDragLeave(event)"></div>
    </div>

    <!-- Pending My Action -->
    <div class="column-mine bg-slate-800/60 rounded-xl p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-orange-500 inline-block"></span>
          <span class="font-semibold text-white text-sm">Pending My Action</span>
        </div>
        <span id="count-mine" class="col-header-count">0</span>
      </div>
      <div id="col-mine" class="drop-zone" ondragover="onDragOver(event)" ondrop="onDrop(event,'mine')" ondragleave="onDragLeave(event)"></div>
    </div>

    <!-- Pending Their Action -->
    <div class="column-theirs bg-slate-800/60 rounded-xl p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-yellow-500 inline-block"></span>
          <span class="font-semibold text-white text-sm">Pending Their Action</span>
        </div>
        <span id="count-theirs" class="col-header-count">0</span>
      </div>
      <div id="col-theirs" class="drop-zone" ondragover="onDragOver(event)" ondrop="onDrop(event,'theirs')" ondragleave="onDragLeave(event)"></div>
    </div>

    <!-- Complete -->
    <div class="column-complete bg-slate-800/60 rounded-xl p-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
          <span class="font-semibold text-white text-sm">Complete</span>
        </div>
        <span id="count-complete" class="col-header-count">0</span>
      </div>
      <div id="col-complete" class="drop-zone" ondragover="onDragOver(event)" ondrop="onDrop(event,'complete')" ondragleave="onDragLeave(event)"></div>
    </div>

  </div>

  <!-- Add Card Modal -->
  <div id="modal-backdrop" class="fixed inset-0 hidden items-center justify-center z-50" onclick="closeModal(event)">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl" onclick="event.stopPropagation()">
      <h2 class="text-white font-bold text-lg mb-4">Add New Card</h2>
      <div class="space-y-3">
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Title *</label>
          <input id="new-title" type="text" placeholder="What's the idea or task?" />
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Description</label>
          <textarea id="new-desc" rows="2" placeholder="Any extra detail..."></textarea>
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Person</label>
          <input id="new-person" type="text" placeholder="e.g. John, Sarah" />
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Team</label>
          <select id="new-team">
            <option value="">— No team —</option>
            <option value="Messaging">Messaging</option>
            <option value="PPC">PPC</option>
            <option value="SEO">SEO</option>
            <option value="Growth">Growth</option>
            <option value="Paid Social">Paid Social</option>
            <option value="Content &amp; Merch">Content &amp; Merch</option>
            <option value="Retail">Retail</option>
            <option value="Affiliate">Affiliate</option>
            <option value="Digital Partner">Digital Partner</option>
          </select>
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Start in column</label>
          <select id="new-col">
            <option value="new">New Idea</option>
            <option value="mine">Pending My Action</option>
            <option value="theirs">Pending Their Action</option>
            <option value="complete">Complete</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 mt-5 justify-end">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="addCard()">Add Card</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-backdrop" class="fixed inset-0 hidden items-center justify-center z-50" onclick="closeEditModal(event)">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl" onclick="event.stopPropagation()">
      <h2 class="text-white font-bold text-lg mb-4">Edit Card</h2>
      <div class="space-y-3">
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Title *</label>
          <input id="edit-title" type="text" />
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Description</label>
          <textarea id="edit-desc" rows="2"></textarea>
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Person</label>
          <input id="edit-person" type="text" />
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Team</label>
          <select id="edit-team">
            <option value="">— No team —</option>
            <option value="Messaging">Messaging</option>
            <option value="PPC">PPC</option>
            <option value="SEO">SEO</option>
            <option value="Growth">Growth</option>
            <option value="Paid Social">Paid Social</option>
            <option value="Content &amp; Merch">Content &amp; Merch</option>
          </select>
        </div>
        <div>
          <label class="text-slate-400 text-xs mb-1 block">Column</label>
          <select id="edit-col">
            <option value="new">New Idea</option>
            <option value="mine">Pending My Action</option>
            <option value="theirs">Pending Their Action</option>
            <option value="complete">Complete</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 mt-5 justify-end">
        <button class="btn-ghost" onclick="closeEditModal()">Cancel</button>
        <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // ─── Supabase setup ────────────────────────────────────────────────────────
    let db = null;
    if (window.SUPABASE_URL && window.SUPABASE_KEY && window.SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
      db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    }

    // ─── State ─────────────────────────────────────────────────────────────────
    let cards = [];
    let dragId = null;
    let editId = null;
    let activeFilter = null;

    const COLS = ['new', 'mine', 'theirs', 'complete'];
    const COL_LABELS = { new: 'New Idea', mine: 'Pending My Action', theirs: 'Pending Their Action', complete: 'Complete' };
    const TEAM_CLASS = {
      'Messaging':        'team-Messaging',
      'PPC':              'team-PPC',
      'SEO':              'team-SEO',
      'Growth':           'team-Growth',
      'Paid Social':      'team-Paid-Social',
      'Content & Merch':  'team-Content-Merch',
      'Retail':           'team-Retail',
      'Affiliate':        'team-Affiliate',
      'Digital Partner':  'team-Digital-Partner',
    };

    function pendingDuration(c) {
      const since = c.status_changed_at || c.created_at;
      if (!since) return '';
      const days = Math.floor((Date.now() - new Date(since)) / 86400000);
      if (days < 1) return { label: 'Today', cls: 'pending-fresh' };
      const weeks = Math.floor(days / 7);
      const rem   = days % 7;
      let label;
      if (days < 7)        label = `${days}d waiting`;
      else if (rem === 0)  label = `${weeks}w waiting`;
      else                 label = `${weeks}w ${rem}d waiting`;
      const cls = days < 7 ? 'pending-fresh' : days < 14 ? 'pending-mid' : days < 28 ? 'pending-late' : 'pending-overdue';
      return { label, cls };
    }

    // ─── Boot ──────────────────────────────────────────────────────────────────
    async function init() {
      if (db) {
        document.getElementById('config-banner').style.display = 'none';
        const { data, error } = await db.from('cards').select('*').order('position');
        if (!error && data) cards = data.map(c => ({...c, column: c.status}));

        // Real-time updates (so WhatsApp changes appear instantly)
        db.channel('cards-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'cards' }, () => loadFromDb())
          .subscribe();
      }
      render();
    }

    async function loadFromDb() {
      if (!db) return;
      const { data } = await db.from('cards').select('*').order('position');
      if (data) { cards = data.map(c => ({...c, column: c.status})); render(); }
    }

    // ─── Render ────────────────────────────────────────────────────────────────
    function setFilter(team, btn) {
      activeFilter = team;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      COLS.forEach(col => {
        const zone = document.getElementById('col-' + col);
        const colCards = cards.filter(c => c.column === col && (!activeFilter || c.team === activeFilter));
        document.getElementById('count-' + col).textContent = colCards.length;
        zone.innerHTML = colCards.map(c => cardHTML(c)).join('');
      });
      // Attach drag events
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('dragstart', e => {
          dragId = e.currentTarget.dataset.id;
          setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
        });
        el.addEventListener('dragend', e => e.currentTarget.classList.remove('dragging'));
      });
    }

    function cardHTML(c) {
      const badgeClass = `badge-${c.column}`;
      const person = c.person ? `<span class="text-xs text-slate-400 mt-1 block">👤 ${esc(c.person)}</span>` : '';
      const desc = c.description ? `<p class="text-slate-400 text-xs mt-1 leading-relaxed">${esc(c.description)}</p>` : '';
      const date = new Date(c.created_at || Date.now()).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
      const teamBadge = c.team ? `<span class="team-badge ${TEAM_CLASS[c.team] || ''}">${esc(c.team)}</span>` : '';
      const pending = c.column === 'theirs' ? pendingDuration(c) : null;
      const pendingBadge = pending ? `<span class="team-badge ${pending.cls}">⏳ ${pending.label}</span>` : '';
      const teamCls = c.team ? 'card-team-'+c.team.replace(/ /g,'-').replace(/&\s*/g,'').replace(/-+/g,'-').replace(/-$/,'') : '';
      return `
        <div class="card ${teamCls}" data-id="${c.id}" draggable="true" ondblclick="openEditModal('${c.id}')">
          <div class="flex items-start justify-between gap-2">
            <span class="text-white text-sm font-medium leading-snug flex-1">${esc(c.title)}</span>
            <button class="delete-btn text-lg leading-none mt-0.5" onclick="deleteCard('${c.id}',event)" title="Delete">×</button>
          </div>
          ${desc}
          ${person}
          <div class="flex items-center justify-between mt-2">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="text-xs ${badgeClass} rounded-full px-2 py-0.5">${COL_LABELS[c.column]}</span>
              ${teamBadge}
              ${pendingBadge}
            </div>
            <span class="text-xs text-slate-600">${date}</span>
          </div>
        </div>`;
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Add card ──────────────────────────────────────────────────────────────
    async function addCard() {
      const title = document.getElementById('new-title').value.trim();
      if (!title) { showToast('Please enter a title'); return; }
      const card = {
        id: db ? undefined : crypto.randomUUID(),
        title,
        description: document.getElementById('new-desc').value.trim(),
        person: document.getElementById('new-person').value.trim(),
        team: document.getElementById('new-team').value,
        column: document.getElementById('new-col').value,
        position: cards.length,
        created_at: new Date().toISOString()
      };
      if (db) {
        const insertData = {
          title: card.title, description: card.description,
          person: card.person, team: card.team, status: card.column, position: card.position
        };
        if (card.column === 'theirs') insertData.status_changed_at = new Date().toISOString();
        const { data, error } = await db.from('cards').insert([insertData]).select().single();
        if (error) { showToast('Error saving: ' + error.message); return; }
        cards.push({...data, column: data.status});
      } else {
        cards.push(card);
      }
      render();
      closeModal();
      clearModal();
      showToast('Card added ✓');
    }

    // ─── Drag & drop ──────────────────────────────────────────────────────────
    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    async function onDrop(e, col) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragId) return;
      const card = cards.find(c => String(c.id) === String(dragId));
      if (!card || card.column === col) return;
      const now = new Date().toISOString();
      card.column = col;
      if (col === 'theirs') card.status_changed_at = now;
      if (db) {
        const upd = { status: col };
        if (col === 'theirs') upd.status_changed_at = now;
        await db.from('cards').update(upd).eq('id', dragId);
      }
      render();
      dragId = null;
    }

    // ─── Edit card ─────────────────────────────────────────────────────────────
    function openEditModal(id) {
      const card = cards.find(c => String(c.id) === String(id));
      if (!card) return;
      editId = id;
      document.getElementById('edit-title').value = card.title || '';
      document.getElementById('edit-desc').value = card.description || '';
      document.getElementById('edit-person').value = card.person || '';
      document.getElementById('edit-team').value = card.team || '';
      document.getElementById('edit-col').value = card.column || 'new';
      const bd = document.getElementById('edit-backdrop');
      bd.classList.remove('hidden');
      bd.classList.add('flex');
    }

    async function saveEdit() {
      const title = document.getElementById('edit-title').value.trim();
      if (!title) { showToast('Title required'); return; }
      const col = document.getElementById('edit-col').value;
      const updates = {
        title,
        description: document.getElementById('edit-desc').value.trim(),
        person: document.getElementById('edit-person').value.trim(),
        team: document.getElementById('edit-team').value,
        column: col
      };
      const card = cards.find(c => String(c.id) === String(editId));
      if (!card) return;
      const now = new Date().toISOString();
      if (col === 'theirs' && card.column !== 'theirs') updates.status_changed_at = now;
      Object.assign(card, updates);
      const dbUpd = { title: updates.title, description: updates.description, person: updates.person, team: updates.team, status: col };
      if (updates.status_changed_at) dbUpd.status_changed_at = updates.status_changed_at;
      if (db) await db.from('cards').update(dbUpd).eq('id', editId);
      render();
      closeEditModal();
      showToast('Saved ✓');
    }

    async function deleteCard(id, e) {
      e.stopPropagation();
      if (!confirm('Delete this card?')) return;
      cards = cards.filter(c => String(c.id) !== String(id));
      if (db) await db.from('cards').delete().eq('id', id);
      render();
      showToast('Card deleted');
    }

    // ─── Modal helpers ─────────────────────────────────────────────────────────
    function openModal() {
      const bd = document.getElementById('modal-backdrop');
      bd.classList.remove('hidden'); bd.classList.add('flex');
      setTimeout(() => document.getElementById('new-title').focus(), 50);
    }
    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-backdrop')) return;
      const bd = document.getElementById('modal-backdrop');
      bd.classList.add('hidden'); bd.classList.remove('flex');
    }
    function closeModal() {
      const bd = document.getElementById('modal-backdrop');
      bd.classList.add('hidden'); bd.classList.remove('flex');
    }
    function clearModal() {
      ['new-title','new-desc','new-person'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('new-team').value = '';
      document.getElementById('new-col').value = 'new';
    }
    function closeEditModal(e) {
      if (e && e.target !== document.getElementById('edit-backdrop')) return;
      const bd = document.getElementById('edit-backdrop');
      bd.classList.add('hidden'); bd.classList.remove('flex');
    }
    function closeEditModal() {
      const bd = document.getElementById('edit-backdrop');
      bd.classList.add('hidden'); bd.classList.remove('flex');
    }

    // ─── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    function dismissBanner() {
      document.getElementById('config-banner').style.display = 'none';
    }

    // Enter key to submit modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeEditModal(); }
    });

    init();

    // Poll every 5 seconds so cards added via WhatsApp appear automatically
    if (db) setInterval(loadFromDb, 5000);
  </script>
</body>
</html>
